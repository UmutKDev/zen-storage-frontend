<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals — light" subtitle="Monochrome base: all structure is grayscale" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { display: flex; gap: 8px; padding: 16px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 10px; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid #e4e4e7; }
  .nm { font-size: var(--text-xs); font-weight: var(--weight-medium); margin: 0; }
  .hx { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; margin: 2px 0 0; }
</style>
</head>
<body>
  <div class="sw" style="background: #ffffff;"><p class="nm">background</p><p class="hx">#ffffff</p></div>
  <div class="sw" style="background: #fafafa;"><p class="nm">surface</p><p class="hx">#fafafa</p></div>
  <div class="sw" style="background: #f4f4f5;"><p class="nm">muted / accent</p><p class="hx">#f4f4f5</p></div>
  <div class="sw" style="background: #e4e4e7;"><p class="nm">border / input</p><p class="hx">#e4e4e7</p></div>
  <div class="sw" style="background: #71717a; color: #ffffff;"><p class="nm">muted-fg</p><p class="hx">#71717a</p></div>
  <div class="sw" style="background: #171717; color: #ffffff;"><p class="nm">foreground</p><p class="hx">#171717</p></div>
</body>
</html>

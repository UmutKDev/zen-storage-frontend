<!-- @dsCard group="Type" viewport="700x330" name="Scale" subtitle="xs 12 → 4xl 36 · one 2xl page title per screen" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 16px 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .tok { width: 110px; flex-shrink: 0; font-family: var(--font-mono); font-size: var(--text-xs); color: var(--muted-foreground); }
  .use { margin-left: auto; flex-shrink: 0; font-size: var(--text-xs); color: var(--muted-foreground); }
  .sp { margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="tok">xs · 12/16</span><p class="sp" style="font-size: var(--text-xs);">Badges, captions, table meta</p><span class="use"></span></div>
  <div class="row"><span class="tok">sm · 14/20</span><p class="sp" style="font-size: var(--text-sm);">Secondary text, dense tables, hints</p></div>
  <div class="row"><span class="tok">base · 16/24</span><p class="sp" style="font-size: var(--text-base);">Body, default</p></div>
  <div class="row"><span class="tok">lg · 18/28</span><p class="sp" style="font-size: var(--text-lg); font-weight: 500;">Emphasized body, list titles</p></div>
  <div class="row"><span class="tok">xl · 20/28</span><p class="sp" style="font-size: var(--text-xl); font-weight: 600;">Section headers</p></div>
  <div class="row"><span class="tok">2xl · 24/32</span><p class="sp" style="font-size: var(--text-2xl); font-weight: 600; letter-spacing: -0.01em;">Page titles</p></div>
  <div class="row"><span class="tok">3xl · 30/36</span><p class="sp" style="font-size: var(--text-3xl); font-weight: 600; letter-spacing: -0.01em;">Landing sections</p></div>
  <div class="row"><span class="tok">4xl · 36/40</span><p class="sp" style="font-size: var(--text-4xl); font-weight: 700; letter-spacing: -0.01em;">Landing hero</p></div>
</body>
</html>

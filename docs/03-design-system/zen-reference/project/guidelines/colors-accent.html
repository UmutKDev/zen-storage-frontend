<!-- @dsCard group="Colors" viewport="700x170" name="Accent — the one orange" subtitle="#d97757 brand · #c2410c filled controls (AA) · dark #e0937a" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { display: flex; gap: 12px; padding: 16px; }
  .sw { flex: 1; border-radius: var(--radius-lg); padding: 12px; height: 110px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--border); }
  .nm { font-size: var(--text-sm); font-weight: var(--weight-medium); margin: 0; }
  .hx { font-family: var(--font-mono); font-size: var(--text-xs); opacity: 0.8; margin: 2px 0 0; }
</style>
</head>
<body>
  <div class="sw" style="background: #d97757; color: #ffffff;">
    <p class="nm">--brand</p>
    <p class="hx">#d97757 · ring, accents, folder icons</p>
  </div>
  <div class="sw" style="background: #c2410c; color: #ffffff;">
    <p class="nm">--primary</p>
    <p class="hx">#c2410c · filled controls (AA on white text)</p>
  </div>
  <div class="sw" style="background: #e0937a; color: #1a1410;">
    <p class="nm">--primary (dark theme)</p>
    <p class="hx">#e0937a · text #1a1410</p>
  </div>
</body>
</html>

<!-- @dsCard group="Type" viewport="700x200" name="Families" subtitle="Geist Sans for UI · Geist Mono for code, hashes, keys" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: center; }
  .lbl { font-size: var(--text-xs); color: var(--muted-foreground); margin: 0 0 6px; }
  .sans { font-size: 28px; font-weight: var(--weight-semibold); letter-spacing: -0.01em; margin: 0; }
  .sans-sub { font-size: var(--text-sm); color: var(--muted-foreground); margin: 6px 0 0; }
  .mono { font-family: var(--font-mono); font-size: var(--text-sm); margin: 0; line-height: 1.7; }
</style>
</head>
<body>
  <div>
    <p class="lbl">Geist Sans — all UI and body text</p>
    <p class="sans">Calm, precise, premium.</p>
    <p class="sans-sub">400 body · 500 labels &amp; buttons · 600 headers · 700 hero only</p>
  </div>
  <div>
    <p class="lbl">Geist Mono — technical metadata only</p>
    <p class="mono">sha256: 9f86d081884c7d65<br>key: storage/q2/report.pdf<br>4.2 MB · May 12, 2026</p>
  </div>
</body>
</html>

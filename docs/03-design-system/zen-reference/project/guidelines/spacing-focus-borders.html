<!-- @dsCard group="Spacing" viewport="700x170" name="Focus & borders" subtitle="Visible focus always — 2px orange ring, offset 2" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px 24px; display: flex; gap: 24px; align-items: center; }
  .demo { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .lbl { font-size: var(--text-xs); color: var(--muted-foreground); margin: 0; }
  .focused-btn { outline: 2px solid var(--ring); outline-offset: 2px; }
  .focused-input { border-color: var(--ring) !important; box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent) !important; }
  .hair { width: 160px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
  <div class="demo">
    <p class="lbl">:focus-visible — always visible</p>
    <button class="zs-btn zs-btn--primary focused-btn">Upload</button>
  </div>
  <div class="demo">
    <p class="lbl">Input focus — 3px ring @ 50%</p>
    <input class="zs-input focused-input" style="width: 180px;" value="Documents" />
  </div>
  <div class="demo">
    <p class="lbl">Hairline divider — 1px --border</p>
    <div class="hair"></div>
    <p class="lbl" style="margin-top: 4px;">never 2px, never colored</p>
  </div>
</body>
</html>
